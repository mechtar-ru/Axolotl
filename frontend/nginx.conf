# NOTE: Dual nginx proxy design.
# This config is for the frontend Docker image (served on port 80).
# The root nginx.conf (docker-compose) proxies /api and /ws to backend,
# while this config is a fallback when frontend runs standalone.
# In docker-compose, the root nginx.conf handles all routing.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8082/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://backend:8082/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}

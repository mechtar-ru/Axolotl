server:
  port: 8082

spring:
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

axolotl:
  apps:
    base-path: ${AXOLOTL_APPS_PATH:/Users/evgenijtihomirov/git/Axolotl}
  db:
    path: ${AXOLOTL_DB_PATH:schema.db}
  jwt:
    secret: ${AXOLOTL_JWT_SECRET:axolotl-secret-key-must-be-at-least-32-chars-long-for-hs256}
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: qwen2.5:0.5b
      timeout: 120
    zen:
      base-url: https://opencode.ai/zen/v1
      api-key: ${ZEN_API_KEY:}
      default-model: big-pickle
      timeout: 3600
  mcp:
    enabled: true
    path: /mcp
  mempalace:
    base-url: ${AXOLOTL_MEMPALACE_URL:http://localhost:5890}
    enabled: ${AXOLOTL_MEMPALACE_ENABLED:false}
  graph:
    enabled: ${AXOLOTL_GRAPH_ENABLED:true}
    token-budget: ${AXOLOTL_GRAPH_TOKEN_BUDGET:2000}
    batch-parallelism: ${AXOLOTL_GRAPH_BATCH_PARALLELISM:8}
    batch-size: ${AXOLOTL_GRAPH_BATCH_SIZE:20}
    codebase-path: ${AXOLOTL_GRAPH_CODEBASE_PATH:}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: INFO
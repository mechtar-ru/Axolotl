server:
  port: 8080

spring:
  main:
    allow-circular-references: true

axolotl:
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: gemma4:e2b
      timeout: 120
  mcp:
    enabled: true
    path: /mcp

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: INFO

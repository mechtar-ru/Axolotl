server:
  port: 8082

spring:
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

axolotl:
  db:
    path: ${AXOLOTL_DB_PATH:schema.db}
  jwt:
    secret: ${AXOLOTL_JWT_SECRET:axolotl-secret-key-must-be-at-least-32-chars-long-for-hs256}
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: qwen2.5:0.5b
      timeout: 120
    llama-cpp:
      base-url: ${LLAMA_CPP_BASE_url:http://localhost:8080}
      default-model: Ternary-Bonsai-1.7B-Q2_0.gguf
      timeout: 300
  mcp:
    enabled: true
    path: /mcp
  mempalace:
    base-url: ${AXOLOTL_MEMPALACE_URL:http://localhost:5890}
    enabled: ${AXOLOTL_MEMPALACE_ENABLED:false}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: INFO

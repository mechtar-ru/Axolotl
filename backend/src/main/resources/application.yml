server:
  port: 8082

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:axolotl2026}
    pool:
      max-active: 16
      max-idle: 4
      max-lifetime: 300000
      connection-timeout: 5000

axolotl:
  features:
    webhook:
      enabled: ${AXOLOTL_FEATURE_WEBHOOK:false}
    graph-query:
      enabled: ${AXOLOTL_FEATURE_GRAPH_QUERY:true}
    tdd-pipeline:
      enabled: ${AXOLOTL_FEATURE_TDD_PIPELINE:true}
    orchestration:
      enabled: ${AXOLOTL_FEATURE_ORCHESTRATION:true}
    experimental:
      draft-node:
        enabled: ${AXOLOTL_FEATURE_DRAFT_NODE:true}
  apps:
    base-path: ${AXOLOTL_APPS_PATH:.}
  jwt:
    secret: ${AXOLOTL_JWT_SECRET:axolotl-secret-key-must-be-at-least-32-chars-long-for-hs256}
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: qwen2.5:0.5b
      timeout: 3600
    zen:
      base-url: https://opencode.ai/zen/v1
      api-key: ${ZEN_API_KEY:}
      default-model: deepseek-v4-flash-free
      timeout: 3600
  mcp:
    enabled: false
    path: /mcp
  mempalace:
    base-url: ${AXOLOTL_MEMPALACE_URL:http://localhost:5890}
    enabled: ${AXOLOTL_MEMPALACE_ENABLED:false}
  graph:
    enabled: ${AXOLOTL_GRAPH_ENABLED:true}
    token-budget: ${AXOLOTL_GRAPH_TOKEN_BUDGET:2000}
    batch-parallelism: ${AXOLOTL_GRAPH_BATCH_PARALLELISM:8}
    batch-size: ${AXOLOTL_GRAPH_BATCH_SIZE:20}
    codebase-path: ${AXOLOTL_GRAPH_CODEBASE_PATH:}
  tools:
  allowed-commands: >-
    bun,cargo,cat,cp,dart,echo,find,flutter,git,go,grep,head,ls,make,
    mkdir,mv,node,npm,npx,printf,pub,python3,pwd,rustc,tail,touch,unzip,zip
  reconciler:
    interval: 300000

  plugins:
    enabled: true
    bun-path: bun
    bridge-path: plugins/plugin-bridge.js
    startup-timeout-ms: 15000
    request-timeout-ms: 30000
    max-restart-attempts: 3
    restart-backoff-ms: 1000
    auto-update: true
    auto-update-on-start: false
    # Comma-separated list of npm packages to load as plugins
    # e.g.: @cortexkit/opencode-magic-context
    list: "@cortexkit/opencode-magic-context"

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: TRACE
    org.springframework.data.neo4j.cypher.deprecation: ERROR
    org.springframework.data.neo4j.cypher.unrecognized: ERROR
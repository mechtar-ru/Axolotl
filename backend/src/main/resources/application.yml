server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

axolotl:
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: qwen2.5:0.5b
      timeout: 120
  mcp:
    enabled: true
    path: /mcp

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: INFO

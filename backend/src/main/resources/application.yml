server:
  port: 8082

spring:
  main:
    allow-circular-references: true
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.autoconfigure.openai.OpenAiEmbeddingAutoConfiguration

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

axolotl:
  db:
    path: ${AXOLOTL_DB_PATH:schema.db}
  jwt:
    secret: ${AXOLOTL_JWT_SECRET:axolotl-secret-key-must-be-at-least-32-chars-long-for-hs256}
  llm:
    ollama:
      base-url: http://localhost:11434
      default-model: qwen2.5:0.5b
      timeout: 120
    zen:
      base-url: https://opencode.ai/zen/v1
      api-key: ${ZEN_API_KEY:}
      default-model: big-pickle
      timeout: 3600
    rlm:
      enabled: ${AXOLOTL_RLM_ENABLED:false}
      python-path: ${AXOLOTL_RLM_PYTHON:python3}
      wrapper-script: '${AXOLOTL_RLM_WRAPPER:}'
      default-model: ${AXOLOTL_RLM_MODEL:gpt-4o}
      timeout: ${AXOLOTL_RLM_TIMEOUT:3600}
      sandbox-type: ${AXOLOTL_RLM_SANDBOX:local}
      max-depth: ${AXOLOTL_RLM_MAX_DEPTH:5}
  tools:
    defaults:
      enabled:
        - file_read
        - file_write
        - directory_read
        - bash
      permissions:
        file_read: read
        file_write: ask
        directory_read: read
        bash: ask
        memory_read: read
        memory_write: ask
        web_search: allow
        web_fetch: allow
        web_parse_html: allow
  mcp:
    enabled: true
    path: /mcp
  mempalace:
    base-url: ${AXOLOTL_MEMPALACE_URL:http://localhost:5890}
    enabled: ${AXOLOTL_MEMPALACE_ENABLED:false}
  plugins:
    whitelist:
      names: mempalace,btca,context7
      managers: pip,npm,opm

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger.html

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.agent.orchestrator: DEBUG
    org.springframework.web: INFO

sentry:
  dsn: ${SENTRY_DSN_BACKEND:}
  traces-sample-rate: 1.0
  send-default-pii: true
  environment: ${SENTRY_ENVIRONMENT:development}
  release: ${SENTRY_RELEASE:}

spring.main.allow-circular-references=true
axolotl.llm.ollama.base-url=http://localhost:11434
axolotl.llm.ollama.default-model=gemma4:e2b
axolotl.mcp.enabled=false
axolotl.db.path=${java.io.tmpdir}/axolotl-test-${random.uuid}.db

# Neo4j config — uses dev database directly (Testcontainers not available)
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=test

# Axolotl Tool Specifications (JSON Schema for LLM tool calling)

tools:
  - id: file_read
    name: Read File
    description: Read contents of a file
    parameters:
      type: object
      properties:
        path:
          type: string
          description: Absolute or relative path to file

  - id: file_write
    name: Write File
    description: Write content to a file, creating directories if needed
    parameters:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
        append: { type: boolean, description: "Append instead of overwrite" }

  - id: bash
    name: Bash
    description: Execute a bash command with optional working directory
    parameters:
      type: object
      properties:
        command: { type: string }
        workdir: { type: string, description: "Working directory" }
        timeout: { type: number, description: "Timeout in ms" }

  - id: web_search
    name: Web Search
    description: Search the web and return results
    parameters:
      type: object
      properties:
        query: { type: string }

  - id: web_fetch
    name: Web Fetch
    description: Fetch content from a HTTP URL
    parameters:
      type: object
      properties:
        url: { type: string }

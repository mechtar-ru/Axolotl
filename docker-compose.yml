version: '3.8'

services:
  # PostgreSQL для бэкенда (на замену SQLite для production)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axolotl}
      POSTGRES_USER: ${POSTGRES_USER:-axolotl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axolotl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - axolotl-network

  # Бэкенд на Spring Boot
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-axolotl}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-axolotl}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-axolotl}
      MEMPALACE_URL: ${MEMPALACE_URL:-http://mempalace:8765}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - axolotl-network

  # Фронтенд на Vue
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - axolotl-network

  # MemPalace сервис (опционально)
  mempalace:
    image: python:3.11-slim
    command: >
      sh -c "pip install mempalace &&
             mempalace init /data &&
             python -m mempalace.mcp_server --http --port 8765"
    volumes:
      - mempalace_data:/data
    ports:
      - "8765:8765"
    networks:
      - axolotl-network

  # Nginx для раздачи статики и проксирования
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - axolotl-network

networks:
  axolotl-network:
    driver: bridge

volumes:
  postgres_data:
  mempalace_data:

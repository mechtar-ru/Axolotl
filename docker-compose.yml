version: '3.8'

services:
  # Бэкенд на Spring Boot
  backend:
    build: ./backend
    environment:
      MEMPALACE_URL: ${MEMPALACE_URL:-http://mempalace:8765}
    ports:
      - "8082:8082"
    depends_on:
      - neo4j
    networks:
      - axolotl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Фронтенд на Vue
  frontend:
    build:
      context: ./frontend
      args:
        # Build-time args for Vite — baked into the bundle
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - axolotl-network

  # MemPalace сервис (опционально)
  mempalace:
    image: python:3.11-slim
    command: >
      sh -c "pip install mempalace &&
             mempalace init /data &&
             python -m mempalace.mcp_server --http --port 8765"
    volumes:
      - mempalace_data:/data
    networks:
      - axolotl-network

  # Nginx для раздачи статики и проксирования
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - axolotl-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Neo4j graph database
  neo4j:
    image: neo4j:5-community
    ports:
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/axolotl2026
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p axolotl2026 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  axolotl-network:
    driver: bridge

volumes:
  mempalace_data:
  neo4j_data:

version: '3.8'

services:
  # PostgreSQL для бэкенда (на замену SQLite для production)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axolotl}
      POSTGRES_USER: ${POSTGRES_USER:-axolotl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axolotl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports exposed externally — internal only via network
    networks:
      - axolotl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axolotl}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Бэкенд на Spring Boot
  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-axolotl}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-axolotl}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-axolotl}
      MEMPALACE_URL: ${MEMPALACE_URL:-http://mempalace:8765}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - axolotl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Фронтенд на Vue
  frontend:
    build:
      context: ./frontend
      args:
        # Build-time args for Vite — baked into the bundle
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - axolotl-network

  # MemPalace сервис (опционально)
  mempalace:
    image: python:3.11-slim
    command: >
      sh -c "pip install mempalace &&
             mempalace init /data &&
             python -m mempalace.mcp_server --http --port 8765"
    volumes:
      - mempalace_data:/data
    networks:
      - axolotl-network

  # Nginx для раздачи статики и проксирования
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - axolotl-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  axolotl-network:
    driver: bridge

volumes:
  postgres_data:
  mempalace_data:

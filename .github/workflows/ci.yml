name: CI

on:
  push:
    branches: [main, 'feature/**', v*]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
          NEO4J_AUTH: neo4j/axolotl2026
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p axolotl2026 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
            
      - name: Compile Backend
        run: cd backend && mvn compile -q
        
      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            nc -z localhost 7687 && echo "Neo4j ready" && break
            sleep 2
          done
        
      - name: Run tests
        run: cd backend && mvn test
        
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: cd frontend && npm ci
        
      - name: Type check
        run: cd frontend && npm run type-check
        
      - name: Build
        run: cd frontend && npm run build